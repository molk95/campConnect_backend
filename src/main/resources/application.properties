spring.application.name=campConnect
spring.config.import=optional:file:.env[.properties]
### DATABASE ###
spring.datasource.url=jdbc:mysql://localhost:3306/campconnect?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
### JPA / HIBERNATE ###
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update

### Token authetification ###
app.jwt.secret=${JWT_SECRET:1234567890123456789012345678901212345678901234567890123456789012}
app.jwt.expiration=${JWT_EXPIRATION:86400000}

cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=30MB
app.upload.max-size=10485760
app.upload.dir=${APP_UPLOAD_DIR:uploads/events}

server.port=8082
server.servlet.context-path=/api
app.stripe.secret-key=${STRIPE_SECRET_KEY:}
app.stripe.publishable-key=${STRIPE_PUBLISHABLE_KEY:}
app.stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET:}
app.stripe.currency=${PAYMENT_CURRENCY:usd}
app.stripe.frontend-base-url=${FRONTEND_BASE_URL:http://localhost:4200}
app.stripe.success-path=${PAYMENT_SUCCESS_PATH:/public/events/my-reservations}
app.stripe.cancel-path=${PAYMENT_CANCEL_PATH:/public/events/my-reservations}

app.google-maps.browser-api-key=${GOOGLE_MAPS_BROWSER_API_KEY:}
app.google-maps.server-api-key=${GOOGLE_MAPS_SERVER_API_KEY:}
app.google-maps.static-map-width=${GOOGLE_MAPS_STATIC_MAP_WIDTH:900}
app.google-maps.static-map-height=${GOOGLE_MAPS_STATIC_MAP_HEIGHT:420}
app.google-maps.static-map-zoom=${GOOGLE_MAPS_STATIC_MAP_ZOOM:14}
app.calendar.default-zone=${CALENDAR_DEFAULT_ZONE:Africa/Lagos}
