spring.application.name=campConnect
### DATABASE ###
spring.datasource.url=jdbc:mysql://localhost:3306/campconnect?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
### JPA / HIBERNATE ###
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update

### Token authetification ###
app.jwt.secret=${JWT_SECRET:1234567890123456789012345678901212345678901234567890123456789012}
app.jwt.expiration=${JWT_EXPIRATION:86400000}

cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

server.port=8082
server.servlet.context-path=/api