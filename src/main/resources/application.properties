spring.application.name=campConnect
spring.config.import=optional:file:.env[.properties]
### DATABASE ###
spring.datasource.url=jdbc:mysql://localhost:3306/campconnect?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
### JPA / HIBERNATE ###
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update

### Token authetification ###
app.jwt.secret=${JWT_SECRET:1234567890123456789012345678901212345678901234567890123456789012}
app.jwt.expiration=${JWT_EXPIRATION:86400000}

cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=30MB
app.upload.max-size=10485760
app.upload.dir=${APP_UPLOAD_DIR:uploads/events}

server.port=8082
server.servlet.context-path=/api
app.stripe.secret-key=${STRIPE_SECRET_KEY:}
app.stripe.publishable-key=${STRIPE_PUBLISHABLE_KEY:}
app.stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET:}
app.stripe.currency=${PAYMENT_CURRENCY:usd}
app.stripe.frontend-base-url=${FRONTEND_BASE_URL:http://localhost:4200}
app.stripe.success-path=${PAYMENT_SUCCESS_PATH:/public/events/my-reservations}
app.stripe.cancel-path=${PAYMENT_CANCEL_PATH:/public/events/my-reservations}


app.google-maps.browser-api-key=${GOOGLE_MAPS_BROWSER_API_KEY:}
app.google-maps.server-api-key=${GOOGLE_MAPS_SERVER_API_KEY:}
app.google-maps.static-map-width=${GOOGLE_MAPS_STATIC_MAP_WIDTH:900}
app.google-maps.static-map-height=${GOOGLE_MAPS_STATIC_MAP_HEIGHT:420}
app.google-maps.static-map-zoom=${GOOGLE_MAPS_STATIC_MAP_ZOOM:14}
app.calendar.default-zone=${CALENDAR_DEFAULT_ZONE:Africa/Lagos}
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USER:}
spring.mail.password=${MAIL_PASS:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

google.client.id=912989049454-mg2qd294ahem05m4j5mrjma89ksbip85.apps.googleusercontent.com

app.notifications.email.enabled=${NOTIFICATION_EMAIL_ENABLED:true}
app.notifications.email.brevo.base-url=${BREVO_API_BASE_URL:https://api.brevo.com/v3}
app.notifications.email.brevo.api-key=${BREVO_API_KEY:}
app.notifications.email.sender-email=${BREVO_SENDER_EMAIL:}
app.notifications.email.sender-name=${BREVO_SENDER_NAME:CampConnect}
app.notifications.email.sandbox-mode=${BREVO_SANDBOX_MODE:false}
app.notifications.email.frontend-base-url=${FRONTEND_BASE_URL:http://localhost:4200}
