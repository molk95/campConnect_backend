global:
  scrape_interval: 10s
  evaluation_interval: 10s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['prometheus:9090']

  - job_name: 'campconnect-backend'
    metrics_path: '/api/actuator/prometheus'
    static_configs:
      - targets: ['backend:8082']
