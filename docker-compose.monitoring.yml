version: '3.8'

services:

  prometheus:
    image: prom/prometheus
    container_name: campconnect-prometheus
    restart: always
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - campconnect-network

  grafana:
    image: grafana/grafana
    container_name: campconnect-grafana
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - campconnect-network

networks:
  campconnect-network:
    external: true