---
- name: Configure CampConnect Kubernetes workload state
  hosts: kubernetes_control
  gather_facts: false
  tasks:
    - name: Check kubectl client
      ansible.builtin.command: kubectl version --client
      register: kubectl_client
      changed_when: false

    - name: Check backend Kubernetes manifests
      ansible.builtin.stat:
        path: "{{ campconnect_backend_repo_path }}/devops/k8s/kustomization.yaml"
      register: backend_kustomization
      failed_when: not backend_kustomization.stat.exists

    - name: Check frontend Kubernetes manifest
      ansible.builtin.stat:
        path: "{{ campconnect_frontend_repo_path }}/devops/k8s/frontend.yaml"
      register: frontend_manifest
      failed_when:
        - deploy_frontend | bool
        - not frontend_manifest.stat.exists

    - name: Apply MySQL, backend, services, and ingress
      ansible.builtin.command: "kubectl apply -k {{ campconnect_backend_repo_path }}/devops/k8s"
      register: backend_apply
      changed_when: "'created' in backend_apply.stdout or 'configured' in backend_apply.stdout"

    - name: Apply frontend service and deployment
      ansible.builtin.command: "kubectl apply -f {{ campconnect_frontend_repo_path }}/devops/k8s/frontend.yaml"
      register: frontend_apply
      changed_when: "'created' in frontend_apply.stdout or 'configured' in frontend_apply.stdout"
      when: deploy_frontend | bool

    - name: Set backend image tag
      ansible.builtin.command: "kubectl -n {{ campconnect_namespace }} set image deployment/campconnect-backend campconnect-backend={{ backend_image_repo }}:{{ backend_image_tag }}"
      register: backend_image_update
      changed_when: "'image updated' in backend_image_update.stdout"
      when: deploy_backend | bool

    - name: Set frontend image tag
      ansible.builtin.command: "kubectl -n {{ campconnect_namespace }} set image deployment/campconnect-frontend campconnect-frontend={{ frontend_image_repo }}:{{ frontend_image_tag }}"
      register: frontend_image_update
      changed_when: "'image updated' in frontend_image_update.stdout"
      when: deploy_frontend | bool

    - name: Wait for MySQL rollout
      ansible.builtin.command: "kubectl -n {{ campconnect_namespace }} rollout status deployment/mysql --timeout={{ rollout_timeout }}"
      changed_when: false

    - name: Wait for backend rollout
      ansible.builtin.command: "kubectl -n {{ campconnect_namespace }} rollout status deployment/campconnect-backend --timeout={{ rollout_timeout }}"
      changed_when: false
      when: deploy_backend | bool

    - name: Wait for frontend rollout
      ansible.builtin.command: "kubectl -n {{ campconnect_namespace }} rollout status deployment/campconnect-frontend --timeout={{ rollout_timeout }}"
      changed_when: false
      when: deploy_frontend | bool

    - name: Show Kubernetes workload summary
      ansible.builtin.command: "kubectl -n {{ campconnect_namespace }} get pods,svc,pvc"
      register: k8s_summary
      changed_when: false

    - name: Print Kubernetes workload summary
      ansible.builtin.debug:
        var: k8s_summary.stdout_lines
