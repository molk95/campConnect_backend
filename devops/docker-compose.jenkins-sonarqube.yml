name: campconnect-devops

services:
  jenkins:
    build:
      context: .
      dockerfile: jenkins/Dockerfile
    image: campconnect/jenkins-devops:lts-jdk17-node22
    container_name: campconnect-jenkins
    restart: unless-stopped
    user: root
    depends_on:
      - sonarqube
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock

  sonarqube:
    image: sonarqube:lts-community
    container_name: campconnect-sonarqube
    restart: unless-stopped
    depends_on:
      - sonar-db
    ports:
      - "9000:9000"
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://sonar-db:5432/sonarqube
      SONAR_JDBC_USERNAME: ${SONAR_JDBC_USERNAME:-sonar}
      SONAR_JDBC_PASSWORD: ${SONAR_JDBC_PASSWORD:-sonar}
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs
    ulimits:
      nofile:
        soft: 131072
        hard: 131072
      nproc:
        soft: 8192
        hard: 8192

  sonar-db:
    image: postgres:16-alpine
    container_name: campconnect-sonar-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: sonarqube
      POSTGRES_USER: ${SONAR_JDBC_USERNAME:-sonar}
      POSTGRES_PASSWORD: ${SONAR_JDBC_PASSWORD:-sonar}
    volumes:
      - sonar_db_data:/var/lib/postgresql/data

volumes:
  jenkins_home:
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs:
  sonar_db_data:
