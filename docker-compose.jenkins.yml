version: '3.8'

services:

  jenkins:
    image: jenkins/jenkins:lts-jdk17
    container_name: campconnect-jenkins
    restart: always
    user: root
    ports:
      - "8085:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      - ./:/workspace/campconnect
    networks:
      - campconnect-network

volumes:
  jenkins_home:

networks:
  campconnect-network:
    external: true