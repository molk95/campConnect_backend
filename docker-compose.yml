version: '3.8'

services:

  mysql:
    image: mysql:8.3
    container_name: campconnect-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: campconnect
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - campconnect-network

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: campconnect-phpmyadmin
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: root
    ports:
      - "8081:80"
    networks:
      - campconnect-network

  backend:
    build: .
    container_name: campconnect-backend
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8082:8082"
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: docker
      APP_UPLOAD_DIR: /app/uploads/events
    volumes:
      - backend_uploads:/app/uploads
    networks:
      - campconnect-network

volumes:
  mysql_data:
  backend_uploads:

networks:
  campconnect-network:
    name: campconnect-network